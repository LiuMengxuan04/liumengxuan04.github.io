<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送你一朵小红花</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bloom {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.8) rotate(20deg); opacity: 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-gentle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-bloom {
            animation: bloom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animate-float {
            animation: floatUp 2.5s ease-in forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .btn-pulse {
            animation: pulse-gentle 2s infinite;
        }
        .music-spin {
            animation: spin-slow 4s linear infinite;
        }
        .music-paused {
            animation-play-state: paused;
        }
        /* 隐藏滚动条 */
        body { overflow: hidden; }
    </style>
</head>
<body class="relative w-full h-screen bg-gradient-to-br from-orange-50 via-red-50 to-pink-100 touch-none select-none cursor-pointer" id="app-container">

    <!-- 背景音乐：建议优先放置本地文件到同目录，避免外链失效 -->
    <audio id="bgm" loop preload="auto" autoplay muted playsinline webkit-playsinline></audio>

    <!-- 右上角音乐控制图标 -->
    <div id="music-btn" class="absolute top-6 right-6 z-50 p-3 bg-white/60 backdrop-blur-md rounded-full shadow-sm border border-rose-100 cursor-pointer hover:bg-white/80 transition-all music-spin music-paused" title="播放/暂停音乐">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
        </svg>
    </div>

    <!-- 背景装饰图案 -->
    <div class="absolute inset-0 opacity-10 pointer-events-none" 
         style="background-image: radial-gradient(#ef4444 1px, transparent 1px); background-size: 40px 40px;">
    </div>

    <!-- 中央引导区 -->
    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-10">
        <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-rose-500 mb-4 tracking-wider drop-shadow-sm text-center">
            送你一朵小红花
        </h1>
        
        <div class="h-24 flex items-center justify-center px-6 w-full max-w-2xl">
            <p id="quote-text" class="text-lg sm:text-xl text-rose-700/90 font-medium text-center transition-opacity duration-300 opacity-100 animate-fade-in leading-relaxed">
                "奖励你今天的坚强！"
            </p>
        </div>

        <!-- 引导按钮 -->
        <div class="mt-8 pointer-events-auto">
            <button id="center-btn" class="btn-pulse group relative inline-flex items-center justify-center gap-2 px-8 py-4 font-bold text-white bg-rose-500 rounded-full shadow-lg shadow-rose-500/30 hover:bg-rose-600 hover:shadow-rose-500/50 transition-all duration-300 active:scale-95">
                <svg class="w-6 h-6 animate-[spin_4s_linear_infinite] group-hover:rotate-12 transition-transform" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="22" r="20" fill="currentColor" />
                    <circle cx="76" cy="41" r="20" fill="currentColor" />
                    <circle cx="66" cy="69" r="20" fill="currentColor" />
                    <circle cx="34" cy="69" r="20" fill="currentColor" />
                    <circle cx="24" cy="41" r="20" fill="currentColor" />
                    <circle cx="50" cy="50" r="16" fill="#facc15" />
                    <path d="M 44 48 Q 46 52 48 48" stroke="#ca8a04" stroke-width="2" stroke-linecap="round" fill="none" />
                    <path d="M 52 48 Q 54 52 56 48" stroke="#ca8a04" stroke-width="2" stroke-linecap="round" fill="none" />
                    <path d="M 42 54 Q 50 60 58 54" stroke="#ca8a04" stroke-width="2" stroke-linecap="round" fill="none" />
                </svg>
                <span>点击屏幕任意处领取</span>
            </button>
        </div>
        
        <p class="mt-6 text-sm text-rose-400/70 font-medium tracking-widest pointer-events-none">
            TAP ANYWHERE TO BLOOM
        </p>
    </div>

    <!-- 脚本逻辑 -->
    <script>
        // 鼓励的话语库 (已扩充)
        const QUOTES = [
            "奖励你今天的坚强！",
            "你比想象中更勇敢。",
            "每一次呼吸都算数，今天辛苦啦。",
            "愿你每天都被温柔以待。",
            "生活明朗，万物可爱。",
            "不要着急，按照自己的节奏来。",
            "哪怕是一点点进步，也值得骄傲！",
            "这朵花，送给从不放弃的你。",
            "深呼吸，一切都会好起来的。",
            "你真的很棒，值得世间所有的美好。",
            "允许自己偶尔的脆弱，没关系的。",
            "今天也要记得多喝水，好好吃饭哦。",
            "把烦恼暂时放下，看看这朵花吧。",
            "你的存在，本身就是一种光芒。",
            "无论今天有多糟糕，明天又是新的一天。",
            "累了就休息一下，地球离了你照样转，但你对你自己最重要。",
            "不要因为一次挫折，就忘记了你原本想去的地方。",
            "你是一颗星星，偶尔被乌云遮住也没关系。",
            "去感受风，感受阳光，感受这朵为你绽放的花。",
            "别对自己太苛刻，你已经做得很好了。",
            "宇宙山河浪漫，生活点滴温暖，都值得你前进。",
            "花会沿路盛开，你以后的路也是。",
            "把普通的日子过得浪漫一些。",
            "你的善良和温柔，总有一天会结出甜美的果实。",
            "做自己的小太阳，无需凭借谁的光。",
            "今天没有惹你生气，就是完美的一天。",
            "即使在阴暗的角落，也要努力向着阳光生长。",
            "好运正在派件，请保持心情舒畅。",
            "你也是某个人翘首以盼的惊喜。",
            "带着这朵小红花，继续勇敢地走下去吧！",
            "慢一点没关系，你一直在前进。",
            "先把今天过好，就是了不起的胜利。",
            "你正在经历的，会让你更有力量。",
            "不用和别人比，和昨天的自己比就很好。",
            "把心放软一点，日子会慢慢甜起来。",
            "你值得被爱，也值得先好好爱自己。",
            "愿你在琐碎日常里，也能捡到小确幸。",
            "请相信，努力从来不会白费。",
            "今天的你，也有认真发光。",
            "所有来不及说出口的委屈，都值得被温柔接住。",
            "风会停，雨会晴，你也会等到答案。",
            "不完美也没关系，你本来就很珍贵。",
            "请继续做那个善良又勇敢的大人。",
            "你跨过的每道坎，都会变成你的底气。",
            "再坚持一下下，花就要开了。",
            "日子有点难，但你一直很能干。",
            "愿你拥有把日子过成诗的能力。",
            "你所期待的，正在路上向你走来。",
            "别怕慢，怕的是停下；你已经很棒了。",
            "把焦虑放在门外，先抱抱努力的自己。",
            "云会散，月会亮，心也会慢慢明朗。",
            "你的温柔，正在悄悄治愈这个世界。",
            "想哭就哭，哭完记得继续闪闪发光。",
            "每一个撑过来的夜晚，都算数。",
            "你不是一个人，你一直被世界悄悄偏爱着。",
            "去做让自己开心的小事，快乐会慢慢变大。",
            "未来不必一次看清，走一步就有一步的风景。",
            "你已经很努力了，剩下的交给时间。",
            "今天也请对自己说一句：辛苦了，谢谢你。",
            "跌跌撞撞也没关系，方向对了就很好。",
            "请收下这份勇气，去见更好的自己。",
            "你的认真生活，本身就很浪漫。",
            "你会好的，这句话不是安慰，是事实。",
            "就算世界偶尔吵闹，你也可以安静且坚定。",
            "你眼里的光，值得被好好珍藏。",
            "别急，属于你的花期正在路上。",
            "愿你抬头有星光，低头有方向。",
            "请记住：你已经比昨天更厉害一点点了。"
        ];

        const container = document.getElementById('app-container');
        const quoteText = document.getElementById('quote-text');
        const bgm = document.getElementById('bgm');
        const musicBtn = document.getElementById('music-btn');
        let isMusicPlaying = false;
        let hasInteracted = false;
        let currentAudioIndex = 0;
        let isTryingNextSource = false;
        let quotePool = [];

        // 音源优先级：本地文件 > 备用外链
        // 1) 把“送你一朵小红花.mp3”放到当前 html 同目录，可获得最稳定体验
        // 2) 若本地不存在，再尝试外链（外链可能因防盗链/地域限制失效）
        const AUDIO_SOURCES = [
            './送你一朵小红花.mp3',
            './music/送你一朵小红花.mp3',
            'https://music.163.com/song/media/outer/url?id=1808492017.mp3'
        ];

        // 花朵的 SVG 代码
        const flowerSVG = `
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-md">
                <circle cx="50" cy="22" r="20" fill="#ef4444" />
                <circle cx="76" cy="41" r="20" fill="#ef4444" />
                <circle cx="66" cy="69" r="20" fill="#ef4444" />
                <circle cx="34" cy="69" r="20" fill="#ef4444" />
                <circle cx="24" cy="41" r="20" fill="#ef4444" />
                <circle cx="50" cy="50" r="16" fill="#facc15" />
                <path d="M 44 48 Q 46 52 48 48" stroke="#ca8a04" stroke-width="2" stroke-linecap="round" fill="none" />
                <path d="M 52 48 Q 54 52 56 48" stroke="#ca8a04" stroke-width="2" stroke-linecap="round" fill="none" />
                <path d="M 42 54 Q 50 60 58 54" stroke="#ca8a04" stroke-width="2" stroke-linecap="round" fill="none" />
            </svg>
        `;

        function shuffleQuotes(list) {
            const arr = [...list];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function refillQuotePool() {
            quotePool = shuffleQuotes(QUOTES);
        }

        // 本次页面会话内不重复：语录池取尽后再重新洗牌
        function getRandomQuote() {
            if (quotePool.length === 0) {
                refillQuotePool();
            }
            return quotePool.pop();
        }

        function updateMusicIcon(isPlaying) {
            musicBtn.classList.toggle('music-paused', !isPlaying);
        }

        function useAudioSource(index) {
            if (index < 0 || index >= AUDIO_SOURCES.length) return false;
            currentAudioIndex = index;
            bgm.src = AUDIO_SOURCES[index];
            bgm.load();
            return true;
        }

        function tryNextAudioSource() {
            if (isTryingNextSource) return;
            isTryingNextSource = true;

            const nextIndex = currentAudioIndex + 1;
            const switched = useAudioSource(nextIndex);
            if (!switched) {
                isTryingNextSource = false;
                console.warn('所有音源均加载失败，请放置本地音频文件：送你一朵小红花.mp3');
                return;
            }

            playMusic();
            isTryingNextSource = false;
        }

        // 尝试播放音乐（必须由用户手势触发）
        function initAudio() {
            if (!hasInteracted) {
                hasInteracted = true;
                if (!bgm.src) {
                    useAudioSource(0);
                }
                playMusic();
            }
        }

        function playMusic() {
            bgm.play().then(() => {
                isMusicPlaying = true;
                updateMusicIcon(true);
            }).catch(e => {
                isMusicPlaying = false;
                updateMusicIcon(false);

                const maybeNotAllowed = e && e.name === 'NotAllowedError';
                if (!maybeNotAllowed) {
                    // 不是自动播放权限问题时，尝试切换下一个音源
                    tryNextAudioSource();
                }

                console.log('音乐播放失败：', e);
            });
        }

        // 开场自动播放策略：
        // 1) 先用静音争取自动播放通过
        // 2) 成功后马上尝试恢复有声播放（部分浏览器可能仍要求手势）
        function tryAutoplayWithSound() {
            bgm.muted = true;
            playMusic();

            setTimeout(() => {
                // 尝试恢复有声
                bgm.muted = false;
                bgm.volume = 1;
            }, 80);
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (isMusicPlaying) {
                bgm.pause();
                isMusicPlaying = false;
                updateMusicIcon(false);
            } else {
                if (!bgm.src) {
                    useAudioSource(0);
                }
                playMusic();
            }
        }

        musicBtn.addEventListener('click', toggleMusic);
        bgm.addEventListener('error', tryNextAudioSource);
        bgm.addEventListener('ended', () => updateMusicIcon(false));

        // 页面加载后立即准备音频并尝试播放：
        // - 桌面端在用户设置允许自动播放时可直接播
        // - 被策略拦截时会静默失败，首次点击后立即恢复
        useAudioSource(0);
        refillQuotePool();
        window.addEventListener('load', () => {
            tryAutoplayWithSound();
        });

        // 种花逻辑
        function plantFlower(x, y) {
            initAudio(); // 首次点击触发音乐

            // 1. 创建花朵元素
            const flower = document.createElement('div');
            const rotation = Math.floor(Math.random() * 360);
            const scale = 0.8 + Math.random() * 0.4;
            
            flower.className = 'absolute pointer-events-none animate-bloom';
            flower.style.left = x + 'px';
            flower.style.top = y + 'px';
            flower.style.marginLeft = '-40px';
            flower.style.marginTop = '-40px';
            flower.style.width = '80px';
            flower.style.height = '80px';
            flower.style.transform = `rotate(${rotation}deg) scale(${scale})`;
            flower.innerHTML = flowerSVG;
            
            container.appendChild(flower);

            // 2. 更新鼓励语
            quoteText.classList.remove('animate-fade-in', 'opacity-100');
            quoteText.classList.add('opacity-0');
            
            setTimeout(() => {
                quoteText.innerText = `"${getRandomQuote()}"`;
                quoteText.classList.remove('opacity-0');
                quoteText.classList.add('animate-fade-in', 'opacity-100');
            }, 200);

            // 3. 花朵飘散动画
            setTimeout(() => {
                flower.classList.remove('animate-bloom');
                flower.classList.add('animate-float');
            }, 1000);

            // 4. 清理 DOM 元素
            setTimeout(() => {
                flower.remove();
            }, 3500);
        }

        // 全局点击事件
        container.addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('#music-btn')) return;
            plantFlower(e.clientX, e.clientY);
        });

        // 移动端触摸事件
        container.addEventListener('touchstart', (e) => {
            if (e.target.closest('button') || e.target.closest('#music-btn')) return;
            const touch = e.touches[0];
            plantFlower(touch.clientX, touch.clientY);
        });

        // 中央按钮点击事件
        document.getElementById('center-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const rect = container.getBoundingClientRect();
            plantFlower(rect.width / 2, rect.height / 2 - 50);
        });

    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Red Flower</title>
    <meta http-equiv="refresh" content="0; url=./送你一朵小红花.html">
</head>
<body>
    <p>正在跳转到页面...</p>
    <p>若未自动跳转，请点击：<a href="./送你一朵小红花.html">Little Red Flower</a></p>
</body>
</html>
